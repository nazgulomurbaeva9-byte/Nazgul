<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAZZIX | Beauty Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <div class="logo">NAZZIX</div>
            <div class="search-container">
                <input type="text" placeholder='Try "Lipstick" or "Serum"...'>
                <button class="search-btn">Search</button>
            </div>
            <div class="user-menu">
                <span>LOGIN/SIGN UP</span>
                <span class="icons">❤️ 👜</span>
            </div>
        </div>
        <nav class="categories-nav">
            <ul>
                <li><a href="#">MAKEUP</a></li>
                <li><a href="#">BRUSHES</a></li>
                <li><a href="#">SKINCARE</a></li>
                <li><a href="#">TRENDING</a></li>
                <li><a href="#">OFFERS</a></li>
            </ul>
        </nav>
    </header>

    <section class="main-banner">
        <div class="banner-content">
            <div class="banner-text">
                <span class="new-label">NEWLY LAUNCHED</span>
                <h2>BRIDESMAID KIT</h2>
                <p class="price-tag">only for <span class="old-price">2144 ₽</span> <span class="new-price">1399 ₽</span></p>
                <button class="shop-now">SHOP NOW</button>
            </div>
            <div class="banner-image">
                <img src="https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?q=80&w=1000&auto=format&fit=crop" alt="Cosmetics">
            </div>
        </div>
    </section>

    <section class="bestsellers">
        <h2 class="title">BESTSELLERS</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="img-placeholder pink"></div>
                <h3>Matte Lipstick</h3>
                <p>899 ₽</p>
                <button class="add-btn">ADD TO CART</button>
            </div>
            <div class="product-card">
                <div class="img-placeholder light-pink"></div>
                <h3>Face Mask</h3>
                <p>450 ₽</p>
                <button class="add-btn">ADD TO CART</button>
            </div>
            <div class="product-card">
                <div class="img-placeholder rose"></div>
                <h3>Glow Serum</h3>
                <p>1200 ₽</p>
                <button class="add-btn">ADD TO CART</button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
